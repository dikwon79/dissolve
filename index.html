<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }
  body {
    font-family: var(--font-sans, "Segoe UI", sans-serif);
    background: #f5f4f0;
    color: #1a1a1a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
    gap: 12px;
  }
  .upload-row {
    display: flex;
    gap: 10px;
    width: 100%;
    max-width: 700px;
  }
  .ubox {
    flex: 1;
    border: 1px solid #ccc;
    border-radius: 10px;
    padding: 10px;
    text-align: center;
    cursor: pointer;
    position: relative;
    min-height: 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    background: #fff;
  }
  .ubox:hover {
    border-color: #888;
  }
  .ubox input {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }
  .ubox img {
    width: 100%;
    height: 60px;
    object-fit: cover;
    border-radius: 5px;
  }
  .ubox .lbl {
    font-size: 11px;
    color: #666;
  }
  .ubox .fname {
    font-size: 10px;
    color: #999;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 100%;
  }
  .tabs {
    display: flex;
    width: 100%;
    max-width: 700px;
    border: 1px solid #ddd;
    border-radius: 10px;
    overflow: hidden;
    background: #f0f0f0;
  }
  .tab {
    flex: 1;
    padding: 8px;
    text-align: center;
    font-size: 12px;
    cursor: pointer;
    color: #666;
    border: none;
    background: transparent;
  }
  .tab.active {
    background: #fff;
    color: #1a1a1a;
    font-weight: 500;
  }
  .panel {
    width: 100%;
    max-width: 700px;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 12px;
    display: none;
    flex-direction: column;
    gap: 10px;
  }
  .panel.show {
    display: flex;
  }
  .acv-wrap {
    background: #222;
    border-radius: 8px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .acv-wrap canvas {
    display: block;
    max-width: 100%;
  }
  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .ic {
    display: flex;
    flex-direction: column;
    gap: 5px;
    padding: 8px;
    background: #f8f8f8;
    border-radius: 8px;
  }
  .ic .t {
    font-size: 11px;
    font-weight: 500;
    color: #444;
  }
  .cr {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .cr label {
    font-size: 11px;
    color: #666;
    min-width: 36px;
  }
  .cr input[type="range"] {
    flex: 1;
    accent-color: #e08030;
  }
  .cr .v {
    font-size: 11px;
    color: #333;
    min-width: 30px;
    text-align: right;
  }
  .cv-wrap {
    width: 100%;
    border-radius: 10px;
    overflow: hidden;
    background: #111;
    min-height: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas {
    display: block;
    max-width: 100%;
    cursor: crosshair;
  }
  .empty {
    color: #888;
    font-size: 13px;
    padding: 30px;
    text-align: center;
  }
  .row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .row label {
    font-size: 12px;
    color: #555;
    min-width: 64px;
  }
  .row input[type="range"] {
    flex: 1;
    accent-color: #e08030;
  }
  .val {
    font-size: 12px;
    color: #222;
    min-width: 34px;
    text-align: right;
  }
  .btns {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  button {
    padding: 6px 14px;
    border-radius: 8px;
    border: 1px solid #ccc;
    cursor: pointer;
    font-size: 12px;
    background: #f0f0f0;
    color: #222;
  }
  button:hover {
    background: #e0e0e0;
  }
  button.primary {
    background: #1a6fd4;
    color: #fff;
    border-color: transparent;
  }
  button.rec {
    background: #c0392b;
    color: #fff;
    border-color: transparent;
  }
  button.ok {
    background: #2e7d32;
    color: #fff;
    border-color: transparent;
  }
  button:disabled {
    opacity: 0.35;
    cursor: default;
  }
  .badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 100px;
    background: #d4edda;
    color: #155724;
  }
  .status {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 100px;
    background: #fff3cd;
    color: #856404;
    display: none;
  }
  .pbar-wrap {
    width: 100%;
    height: 4px;
    background: #e0e0e0;
    border-radius: 2px;
    display: none;
  }
  .pbar {
    height: 4px;
    background: #e08030;
    border-radius: 2px;
    width: 0%;
  }
  .hint-bar {
    font-size: 11px;
    color: #888;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #e08030;
  }
  .yt-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .yt-row input[type="text"] {
    flex: 1;
    font-size: 12px;
    padding: 6px 10px;
    border: 1px solid #ccc;
    border-radius: 8px;
    outline: none;
  }
  .yt-wrap {
    width: 100%;
    border-radius: 10px;
    overflow: hidden;
    aspect-ratio: 16/9;
    display: none;
  }
  .yt-wrap iframe {
    width: 100%;
    height: 100%;
    border: none;
  }
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.88);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    z-index: 999;
    padding: 16px;
    cursor: pointer;
  }
  .overlay-msg {
    color: #fff;
    font-size: 13px;
    background: rgba(255, 255, 255, 0.12);
    padding: 6px 14px;
    border-radius: 20px;
    text-align: center;
    line-height: 1.7;
  }
  .overlay img {
    max-width: 100%;
    max-height: 75vh;
    border-radius: 8px;
    cursor: default;
  }
  .overlay-close {
    color: #aaa;
    font-size: 12px;
    cursor: pointer;
  }
</style>

<div class="upload-row">

    <input type="file" accept="image/*" id="f1" />

<!-- ① 정렬 -->

  <!-- 유튜브 -->

  <div class="row">

    ><input type="range" id="holdE" min="0" max="5" step="0.5" value="2" /><span

      >2초</span
    >

    ><input type="range" id="fsize" min="10" max="55" value="28" /><span

      type="checkbox"

  <div class="pbar-wrap" id="pbarWrap"><div class="pbar" id="pbar"></div></div>
  <div class="btns">

    <button id="bReset">처음으로</button>
    <button class="rec" id="bRec">● GIF 저장</button>
    <span class="badge" id="cpBadge" style="display: none">중심점 설정됨</span>
    <span class="status" id="statusBadge"></span>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
<script>
  // ══════════════ 탭 ══════════════
  function switchTab(n) {
    document.getElementById("p1").classList.toggle("show", n === 1);
    document.getElementById("p2").classList.toggle("show", n === 2);
    document.getElementById("tab1").classList.toggle("active", n === 1);
    document.getElementById("tab2").classList.toggle("active", n === 2);
  }

  // ══════════════ 정렬 ══════════════
  const AW = 460,
    AH = 360;
  const acv = document.getElementById("acv"),
    actx = acv.getContext("2d");
  acv.width = AW;
  acv.height = AH;
  let img1 = null,
    img2 = null,
    aligned1 = null,
    aligned2 = null;

  function getT(s, x, y) {
    return {
      sc: parseFloat(s.value) / 100,
      dx: parseFloat(x.value),
      dy: parseFloat(y.value),
    };
  }

  const sliders = [
    ["s1", "s1v", "%"],
    ["x1", "x1v", ""],
    ["y1", "y1v", ""],
    ["s2", "s2v", "%"],
    ["x2", "x2v", ""],
    ["y2", "y2v", ""],
  ];
  sliders.forEach(([id, vid, sfx]) => {
    document.getElementById(id).oninput = () => {
      document.getElementById(vid).textContent =
        document.getElementById(id).value + sfx;
      drawAlign();
    };
  });

  function drawAlign() {
    actx.clearRect(0, 0, AW, AH);
    actx.fillStyle = "#222";
    actx.fillRect(0, 0, AW, AH);
    function di(img, t, a) {
      if (!img) return;
      const fit = Math.min(AW / img.naturalWidth, AH / img.naturalHeight);
      const dw = img.naturalWidth * fit * t.sc,
        dh = img.naturalHeight * fit * t.sc;
      actx.globalAlpha = a;
      actx.drawImage(img, (AW - dw) / 2 + t.dx, (AH - dh) / 2 + t.dy, dw, dh);
      actx.globalAlpha = 1;
    }
    di(
      img1,
      getT(
        document.getElementById("s1"),
        document.getElementById("x1"),
        document.getElementById("y1"),
      ),
      img2 ? 0.55 : 1,
    );
    di(
      img2,
      getT(
        document.getElementById("s2"),
        document.getElementById("x2"),
        document.getElementById("y2"),
      ),
      img1 ? 0.55 : 1,
    );
    // 십자선
    actx.strokeStyle = "rgba(240,160,48,0.5)";
    actx.lineWidth = 1;
    actx.setLineDash([4, 4]);
    actx.beginPath();
    actx.moveTo(AW / 2, 0);
    actx.lineTo(AW / 2, AH);
    actx.stroke();
    actx.beginPath();
    actx.moveTo(0, AH / 2);
    actx.lineTo(AW, AH / 2);
    actx.stroke();
    actx.setLineDash([]);
  }

  function renderOne(img, t) {
    const oc = document.createElement("canvas");
    oc.width = AW;
    oc.height = AH;
    const c = oc.getContext("2d");
    c.fillStyle = "#000";
    c.fillRect(0, 0, AW, AH);
    const fit = Math.min(AW / img.naturalWidth, AH / img.naturalHeight);
    const dw = img.naturalWidth * fit * t.sc,
      dh = img.naturalHeight * fit * t.sc;
    c.drawImage(img, (AW - dw) / 2 + t.dx, (AH - dh) / 2 + t.dy, dw, dh);
    return oc;
  }

  document.getElementById("bApply").onclick = () => {
    aligned1 = renderOne(
      img1,
      getT(
        document.getElementById("s1"),
        document.getElementById("x1"),
        document.getElementById("y1"),
      ),
    );
    aligned2 = renderOne(
      img2,
      getT(
        document.getElementById("s2"),
        document.getElementById("x2"),
        document.getElementById("y2"),
      ),
    );
    document.getElementById("tabs").style.display = "flex";
    switchTab(2);
    initDissolve();
  };

  function loadImg(f) {
    return new Promise((res) => {
      const r = new FileReader();
      r.onload = (e) => {
        const i = new Image();
        i.onload = () => res(i);
        i.src = e.target.result;
      };
      r.readAsDataURL(f);
    });
  }
  function setThumb(id, img, name) {
    const b = document.getElementById(id);
    const inp = document.createElement("input");
    inp.type = "file";
    inp.accept = "image/*";
    inp.onchange = id === "box1" ? onF1 : onF2;
    b.innerHTML = "";
    b.appendChild(inp);
    const t = document.createElement("img");
    t.src = img.src;
    b.appendChild(t);
    const n = document.createElement("div");
    n.className = "fname";
    n.textContent = name;
    b.appendChild(n);
  }
  async function onF1(e) {
    if (!e.target.files[0]) return;
    img1 = await loadImg(e.target.files[0]);
    setThumb("box1", img1, e.target.files[0].name);
    onBoth();
  }
  async function onF2(e) {
    if (!e.target.files[0]) return;
    img2 = await loadImg(e.target.files[0]);
    setThumb("box2", img2, e.target.files[0].name);
    onBoth();
  }
  document.getElementById("f1").onchange = onF1;
  document.getElementById("f2").onchange = onF2;
  function onBoth() {
    drawAlign();
    if (img1 && img2) {
      document.getElementById("tabs").style.display = "flex";
      document.getElementById("bApply").disabled = false;
    }
  }

  // ══════════════ 유튜브 ══════════════
  let ytPlayer = null;
  window.onYouTubeIframeAPIReady = () => {};
  (() => {
    const s = document.createElement("script");
    s.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(s);
  })();

  function ytId(url) {
    const m = url.match(/(?:youtu\.be\/|v=|\/embed\/)([A-Za-z0-9_-]{11})/);
    return m ? m[1] : null;
  }

  document.getElementById("bYtSet").onclick = () => {
    const vid = ytId(document.getElementById("ytUrl").value.trim());
    if (!vid) {
      alert("유효한 YouTube URL을 입력해주세요");
      return;
    }
    document.getElementById("ytWrap").style.display = "block";
    if (ytPlayer && ytPlayer.loadVideoById) {
      ytPlayer.loadVideoById(vid);
      ytPlayer.pauseVideo();
    } else {
      ytPlayer = new YT.Player("ytDiv", {
        width: "100%",
        height: "100%",
        videoId: vid,
        playerVars: { autoplay: 0, controls: 1, rel: 0, modestbranding: 1 },
      });
    }
    document.getElementById("bYtClear").style.display = "inline";
  };
  document.getElementById("bYtClear").onclick = () => {
    if (ytPlayer && ytPlayer.stopVideo) ytPlayer.stopVideo();
    document.getElementById("ytWrap").style.display = "none";
    document.getElementById("ytUrl").value = "";
    document.getElementById("bYtClear").style.display = "none";
  };
  function ytPlay() {
    try {
      if (ytPlayer && ytPlayer.playVideo) ytPlayer.playVideo();
    } catch (e) {}
  }
  function ytPause() {
    try {
      if (ytPlayer && ytPlayer.pauseVideo) ytPlayer.pauseVideo();
    } catch (e) {}
  }

  // ══════════════ 디졸브 ══════════════
  const cv = document.getElementById("cv"),
    ctx = cv.getContext("2d");
  let alpha = 0,
    playing = false,
    rafId = null;
  let cx_ = 0.5,
    cy_ = 0.4;
  let off = document.createElement("canvas"),
    octx = off.getContext("2d");
  let laughDone = false;
  let gifFrames = [],
    capturingGif = false,
    lastCapTime = 0;
  const GIF_FPS = 10,
    GIF_INTERVAL = 1000 / GIF_FPS;
  const gifCv = document.createElement("canvas"),
    gifCtx = gifCv.getContext("2d");
  const GIF_W = 360;

  const $ = (id) => document.getElementById(id);
  const prog = $("prog"),
    progV = $("progV"),
    spd = $("spd"),
    spdV = $("spdV");
  const holdS = $("holdS"),
    holdSV = $("holdSV"),
    holdE = $("holdE"),
    holdEV = $("holdEV");
  const soft = $("soft"),
    softV = $("softV"),
    fsize = $("fsize"),
    fsizeV = $("fsizeV");
  const chkRev = $("chkRev"),
    bPlay = $("bPlay"),
    bReset = $("bReset"),
    bRec = $("bRec");
  const cpBadge = $("cpBadge"),
    statusBadge = $("statusBadge"),
    pbarWrap = $("pbarWrap"),
    pbar = $("pbar");

  spd.oninput = () => (spdV.textContent = spd.value);
  holdS.oninput = () => (holdSV.textContent = holdS.value + "초");
  holdE.oninput = () => (holdEV.textContent = holdE.value + "초");
  soft.oninput = () => {
    softV.textContent = soft.value + "%";
    drawD();
  };
  fsize.oninput = () => {
    fsizeV.textContent = fsize.value + "%";
    drawD();
  };
  prog.oninput = () => {
    if (playing) stopPlay();
    alpha = prog.value / 100;
    progV.textContent = prog.value + "%";
    drawD();
  };

  function initDissolve() {
    cv.width = AW;
    cv.height = AH;
    const gs = GIF_W / AW;
    gifCv.width = GIF_W;
    gifCv.height = Math.round(AH * gs);
    cv.style.display = "block";
    $("empty").style.display = "none";
    alpha = 0;
    laughDone = false;
    prog.value = 0;
    progV.textContent = "0%";
    drawD();
  }

  function drawD() {
    if (!aligned1 || !aligned2) return;
    if (off.width !== cv.width || off.height !== cv.height) {
      off.width = cv.width;
      off.height = cv.height;
    }
    ctx.globalAlpha = 1;
    ctx.drawImage(aligned1, 0, 0, cv.width, cv.height);
    if (alpha > 0) {
      const px = cx_ * cv.width,
        py = cy_ * cv.height;
      const fw = (fsize.value / 100) * cv.width,
        fh = fw * 1.32,
        sf = soft.value / 100;
      octx.clearRect(0, 0, off.width, off.height);
      octx.globalAlpha = 1;
      octx.drawImage(aligned2, 0, 0, off.width, off.height);
      octx.globalCompositeOperation = "destination-in";
      octx.save();
      octx.translate(px, py);
      octx.scale(1, fh / fw);
      const g = octx.createRadialGradient(0, 0, fw * (1 - sf), 0, 0, fw);
      g.addColorStop(0, "rgba(0,0,0,1)");
      g.addColorStop(1, "rgba(0,0,0,0)");
      octx.fillStyle = g;
      octx.fillRect(-fw * 2, -fw * 2, fw * 4, fw * 4);
      octx.restore();
      octx.globalCompositeOperation = "source-over";
      ctx.globalAlpha = alpha;
      ctx.drawImage(off, 0, 0);
      ctx.globalAlpha = 1;
    }
    if (alpha < 0.06) drawCross();
  }
  function drawCross() {
    const px = cx_ * cv.width,
      py = cy_ * cv.height;
    ctx.save();
    ctx.strokeStyle = "rgba(240,160,48,0.75)";
    ctx.lineWidth = 1.5;
    ctx.setLineDash([3, 3]);
    ctx.beginPath();
    ctx.arc(px, py, 12, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.moveTo(px - 18, py);
    ctx.lineTo(px + 18, py);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(px, py - 18);
    ctx.lineTo(px, py + 18);
    ctx.stroke();
    ctx.restore();
  }
  cv.addEventListener("click", (e) => {
    const r = cv.getBoundingClientRect();
    cx_ = (e.clientX - r.left) / r.width;
    cy_ = (e.clientY - r.top) / r.height;
    cpBadge.style.display = "inline";
    drawD();
  });

  function capFrame(ts) {
    if (capturingGif && ts - lastCapTime >= GIF_INTERVAL) {
      gifCtx.drawImage(cv, 0, 0, gifCv.width, gifCv.height);
      gifFrames.push(gifCtx.getImageData(0, 0, gifCv.width, gifCv.height));
      lastCapTime = ts;
    }
  }
  function stopPlay() {
    playing = false;
    bPlay.textContent = "재생";
    cancelAnimationFrame(rafId);
  }

  function runAnimation(onComplete) {
    if (alpha >= 1) {
      alpha = 0;
      laughDone = false;
    }
    playing = true;
    bPlay.textContent = "일시정지";
    ytPlay();
    const v = () => spd.value * 0.07;
    const hs = parseFloat(holdS.value),
      he = parseFloat(holdE.value),
      doRev = chkRev.checked;
    let phase = "hs",
      remain = hs,
      last = null;
    function step(ts) {
      if (!playing) return;
      if (last === null) last = ts;
      const dt = (ts - last) / 1000;
      last = ts;
      capFrame(ts);
      if (phase === "hs") {
        remain -= dt;
        if (remain <= 0) phase = "fwd";
        rafId = requestAnimationFrame(step);
        return;
      }
      if (phase === "fwd") {
        alpha += v() * dt;
        if (alpha >= 1) {
          alpha = 1;
          drawD();
          capFrame(ts + 1);
          phase = "he";
          remain = he;
          rafId = requestAnimationFrame(step);
          return;
        }
        prog.value = Math.round(alpha * 100);
        progV.textContent = Math.round(alpha * 100) + "%";
        drawD();
        rafId = requestAnimationFrame(step);
        return;
      }
      if (phase === "he") {
        remain -= dt;
        if (remain <= 0) {
          if (doRev) phase = "rev";
          else {
            playing = false;
            bPlay.textContent = "재생";
            ytPause();
            if (onComplete) onComplete();
            return;
          }
        }
        rafId = requestAnimationFrame(step);
        return;
      }
      if (phase === "rev") {
        alpha -= v() * dt;
        if (alpha <= 0) {
          alpha = 0;
          prog.value = 0;
          progV.textContent = "0%";
          drawD();
          capFrame(ts + 1);
          playing = false;
          bPlay.textContent = "재생";
          ytPause();
          if (onComplete) onComplete();
          return;
        }
        prog.value = Math.round(alpha * 100);
        progV.textContent = Math.round(alpha * 100) + "%";
        drawD();
        rafId = requestAnimationFrame(step);
        return;
      }
    }
    rafId = requestAnimationFrame(step);
  }

  bPlay.onclick = () => {
    if (playing) {
      stopPlay();
      ytPause();
    } else runAnimation(null);
  };
  bReset.onclick = () => {
    stopPlay();
    ytPause();
    alpha = 0;
    laughDone = false;
    capturingGif = false;
    gifFrames = [];
    prog.value = 0;
    progV.textContent = "0%";
    pbarWrap.style.display = "none";
    statusBadge.style.display = "none";
    drawD();
  };

  bRec.onclick = async () => {
    if (!aligned1 || !aligned2) return;
    stopPlay();
    ytPause();
    alpha = 0;
    laughDone = false;
    gifFrames = [];
    prog.value = 0;
    progV.textContent = "0%";
    drawD();
    let workerURL;
    try {
      const res = await fetch(
        "https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js",
      );
      workerURL = URL.createObjectURL(
        new Blob([await res.text()], { type: "text/javascript" }),
      );
    } catch (e) {
      statusBadge.textContent = "⚠ 로드 실패";
      statusBadge.style.display = "inline";
      return;
    }
    capturingGif = true;
    lastCapTime = 0;
    bRec.disabled = true;
    bPlay.disabled = true;
    bReset.disabled = true;
    statusBadge.textContent = "● 캡처 중...";
    statusBadge.style.display = "inline";
    runAnimation(() => {
      capturingGif = false;
      statusBadge.textContent = "⚙ 인코딩 중...";
      pbarWrap.style.display = "block";
      pbar.style.width = "0%";
      const gif = new GIF({
        workers: 2,
        quality: 12,
        width: gifCv.width,
        height: gifCv.height,
        workerScript: workerURL,
      });
      gifFrames.forEach((f) =>
        gif.addFrame(f, { copy: true, delay: Math.round(GIF_INTERVAL) }),
      );
      gif.on("progress", (p) => {
        pbar.style.width = Math.round(p * 100) + "%";
      });
      gif.on("finished", (blob) => {
        URL.revokeObjectURL(workerURL);
        pbarWrap.style.display = "none";
        statusBadge.style.display = "none";
        bRec.disabled = false;
        bPlay.disabled = false;
        bReset.disabled = false;
        showOverlay(URL.createObjectURL(blob));
      });
      gif.render();
    });
  };

  function showOverlay(url) {
    const ov = document.createElement("div");
    ov.className = "overlay";
    const msg = document.createElement("div");
    msg.className = "overlay-msg";
    msg.innerHTML =
      "GIF 완성! 🎉<br>우클릭 → 이미지 저장 (PC) | 꾹 누르기 (모바일)";
    const img = document.createElement("img");
    img.src = url;
    const cl = document.createElement("div");
    cl.className = "overlay-close";
    cl.textContent = "✕  닫기";
    ov.appendChild(msg);
    ov.appendChild(img);
    ov.appendChild(cl);
    document.body.appendChild(ov);
    img.onclick = (e) => e.stopPropagation();
    cl.onclick = (e) => {
      e.stopPropagation();
      ov.remove();
      URL.revokeObjectURL(url);
    };
    ov.onclick = () => {
      ov.remove();
      URL.revokeObjectURL(url);
    };
  }
</script>
